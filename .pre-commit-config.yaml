repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: .env.example

  - repo: local
    hooks:
      - id: acceptance-tests
        name: acceptance baseline tests
        entry: venv/bin/pytest tests/test_acceptance.py -q
        language: system
        pass_filenames: false
        always_run: false
        files: ^(agent/agent\.py|agent/tools\.py)$
